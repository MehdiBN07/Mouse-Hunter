<!DOCTYPE html>
<html id="html-tag" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Hunter Online</title>
    <style>
        :root {
            --primary-bg: #a2d2ff;
            --grass-color: #70e000;
            --wood-dark: #5d4037;
            --wood-light: #8d6e63;
            --btn-start: #4caf50;
            --btn-settings: #2196f3;
            --btn-back: #f44336;
            --mouse-body: #9e9e9e;
            --mouse-ear-inner: #ffc0cb;
            --mouse-eye: #000000;
            --mouse-nose: #ff4081;
            --error-color: #ff1744; 
        }

        body {
            margin: 0; padding: 0;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; background: var(--primary-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; touch-action: manipulation;
        }

        .panel {
            background: var(--wood-light);
            border: 8px solid var(--wood-dark);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 0 var(--wood-dark), 0 20px 30px rgba(0,0,0,0.3);
            text-align: center; color: white; width: 340px;
            position: relative; z-index: 20;
        }

        .hidden { display: none !important; }

        .btn {
            display: block; width: 100%; padding: 12px; margin: 10px 0;
            border: none; border-radius: 12px; color: white;
            font-size: 18px; font-weight: bold; cursor: pointer;
            transition: all 0.2s; box-shadow: 0 6px 0 rgba(0,0,0,0.2);
        }

        .btn:disabled { background: #95a5a6; cursor: not-allowed; box-shadow: none; }
        .btn:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
        .btn-start { background: var(--btn-start); border-bottom: 5px solid #388e3c; }
        .btn-settings { background: var(--btn-settings); border-bottom: 5px solid #1976d2; }
        .btn-back { background: var(--btn-back); border-bottom: 5px solid #d32f2f; }
        .btn-amber { background: #ffa000; border-bottom: 5px solid #ef6c00; }

        #game-container {
            position: relative; width: 90vw; max-width: 500px; height: 60vh;
            background: var(--grass-color); border: 10px solid var(--wood-dark);
            border-radius: 25px; overflow: hidden; display: none;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.2);
        }

        #mouse {
            position: absolute; width: 55px; height: 45px;
            background: var(--mouse-body); border-radius: 50% 50% 40% 40%;
            cursor: pointer; transition: transform 0.1s ease-out;
            background-image: 
                radial-gradient(circle at 18px 18px, var(--mouse-eye) 3px, transparent 3px),
                radial-gradient(circle at 37px 18px, var(--mouse-eye) 3px, transparent 3px),
                radial-gradient(circle at 27.5px 33px, var(--mouse-nose) 4px, transparent 4px);
            z-index: 5;
        }

        #mouse::before, #mouse::after {
            content: ''; position: absolute; width: 24px; height: 24px;
            background: var(--mouse-body); border-radius: 50%; top: -10px;
            background-image: radial-gradient(circle, var(--mouse-ear-inner) 6px, var(--mouse-body) 7px);
        }
        #mouse::before { left: -6px; }
        #mouse::after { right: -6px; }

        .top-bar { display: flex; justify-content: space-around; width: 90vw; max-width: 500px; margin-bottom: 10px; }
        .stat-box { background: var(--wood-dark); color: white; padding: 5px 15px; border-radius: 10px; font-weight: bold; }
        
        input[type="text"] {
            width: 85%; padding: 10px; border-radius: 8px; border: 3px solid var(--wood-dark);
            margin-bottom: 5px; font-size: 16px; text-align: center;
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center;
            z-index: 100;
        }

        .modal-content {
            background: var(--wood-light); border: 8px solid var(--wood-dark);
            border-radius: 20px; padding: 25px; text-align: center; color: white; width: 300px;
        }

        .leaderboard-list {
            list-style: none; padding: 0; margin: 15px 0;
            background: rgba(0,0,0,0.2); border-radius: 10px;
            height: 220px; overflow-y: auto; border: 2px solid var(--wood-dark);
        }
        .leaderboard-list li { 
            padding: 8px 15px; border-bottom: 1px solid rgba(255,255,255,0.1); 
            display: flex; justify-content: space-between; font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="main-menu" class="panel">
        <h1 id="txt-title">صيد الفأر</h1>
        <input type="text" id="player-name" placeholder="اكتب اسمك..." maxlength="12">
        <div id="error-text" style="color: var(--error-color); display: none; margin-bottom: 10px;">يرجى كتابة اسمك!</div>
        <button class="btn btn-start" id="btn-start" onclick="startGame()">ابدأ اللعب</button>
        <button class="btn btn-settings" id="btn-leader" onclick="toggleSettings(true)">المتصدرين</button>
    </div>

    <div id="settings-menu" class="panel hidden">
        <h2 id="txt-leader-title">أفضل 100 لاعب</h2>
        <ul id="leaderboard-list" class="leaderboard-list">
            <li>جاري التحميل...</li>
        </ul>
        <label id="label-lang" style="display:block; margin-bottom:5px;">اللغة:</label>
        <select id="lang-select" onchange="changeLanguage()" style="width: 100%; padding: 8px; border-radius: 5px; margin-bottom: 15px;">
            <option value="ar">العربية</option>
            <option value="en">English</option>
            <option value="fr">Français</option>
        </select>
        <button class="btn btn-back" id="btn-back" onclick="toggleSettings(false)">رجوع</button>
    </div>

    <div id="game-ui" class="hidden" style="text-align:center; width:100%; display:flex; flex-direction:column; align-items:center;">
        <div class="top-bar">
            <div class="stat-box"><span id="txt-lives-label">الفرص:</span> <span id="lives-display">7</span></div>
            <div class="stat-box"><span id="txt-score-label">النقاط:</span> <span id="score-display">0</span></div>
        </div>
        <div id="game-container" onclick="missClick(event)">
            <div id="mouse" onclick="hitMouse(event)"></div>
        </div>
        <button class="btn btn-amber" id="btn-surrender" style="width: 90vw; max-width: 500px; margin-top: 15px;" onclick="showModal('confirm-modal')">استسلام</button>
    </div>

    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 id="txt-confirm-msg">هل تريد الاستسلام؟</h3>
            <button class="btn btn-start" onclick="endGame()">نعم</button>
            <button class="btn btn-back" onclick="hideModal('confirm-modal')">إلغاء</button>
        </div>
    </div>

    <div id="result-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 id="txt-result-title">انتهت اللعبة!</h2>
            <p id="txt-final-score-msg">نتيجتك: 0</p>
            <button class="btn btn-settings" onclick="hideModal('result-modal'); quitToMenu();">حسناً</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        // --- بيانات Firebase المحدثة برابط بلجيكا الصحيح ---
        const firebaseConfig = {
            apiKey: "AIzaSyCyc21A89tKSJ8NWw8yFTNLZa29DY840RQ",
            authDomain: "ratgame-27efd.firebaseapp.com",
            databaseURL: "https://ratgame-27efd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "ratgame-27efd",
            storageBucket: "ratgame-27efd.firebasestorage.app",
            messagingSenderId: "967240699809",
            appId: "1:967240699809:web:ac12978e2627ef2dfa45e0"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const translations = {
            ar: { title: "صيد الفأر", start: "ابدأ اللعب", leader: "المتصدرين", leaderTitle: "أفضل 100 لاعب", back: "رجوع", lang: "اللغة:", lives: "الفرص:", score: "النقاط:", surrender: "استسلام", error: "يرجى كتابة اسمك!", result: "انتهت اللعبة!", final: "نتيجتك هي: ", confirm: "هل تريد الاستسلام؟", ok: "حسناً", loading: "جاري التحميل...", dir: "rtl" },
            en: { title: "Mouse Hunter", start: "Start Game", leader: "Leaderboard", leaderTitle: "Top 100 Players", back: "Back", lang: "Language:", lives: "Lives:", score: "Score:", surrender: "Surrender", error: "Please enter your name!", result: "Game Over!", final: "Your Score: ", confirm: "Surrender?", ok: "OK", loading: "Loading...", dir: "ltr" },
            fr: { title: "Chasseur de Souris", start: "Jouer", leader: "Classement", leaderTitle: "Top 100 Joueurs", back: "Retour", lang: "Langue:", lives: "Vies:", score: "Score:", surrender: "Abandonner", error: "Entrez votre nom!", result: "Fin de jeu!", final: "Ton Score: ", confirm: "Abandonner?", ok: "D'accord", loading: "Chargement...", dir: "ltr" }
        };

        let score = 0, lives = 7, gameInterval;

        function changeLanguage() {
            const lang = document.getElementById('lang-select').value;
            const t = translations[lang];
            document.getElementById('html-tag').dir = t.dir;
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('btn-start').innerText = t.start;
            document.getElementById('btn-leader').innerText = t.leader;
            document.getElementById('txt-leader-title').innerText = t.leaderTitle;
            document.getElementById('btn-back').innerText = t.back;
            document.getElementById('label-lang').innerText = t.lang;
            document.getElementById('txt-lives-label').innerText = t.lives;
            document.getElementById('txt-score-label').innerText = t.score;
            document.getElementById('btn-surrender').innerText = t.surrender;
            document.getElementById('error-text').innerText = t.error;
            document.getElementById('txt-confirm-msg').innerText = t.confirm;
            document.getElementById('txt-result-title').innerText = t.result;
        }

        function startGame() {
            const name = document.getElementById('player-name').value.trim();
            if (name === "") { document.getElementById('error-text').style.display = 'block'; return; }
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('game-container').style.display = 'block';
            score = 0; lives = 7;
            document.getElementById('score-display').innerText = score;
            document.getElementById('lives-display').innerText = lives;
            updateDifficulty();
            moveMouse();
        }

        function moveMouse() {
            const gc = document.getElementById('game-container');
            const m = document.getElementById('mouse');
            m.style.left = Math.floor(Math.random() * (gc.clientWidth - 55)) + 'px';
            m.style.top = Math.floor(Math.random() * (gc.clientHeight - 45)) + 'px';
        }

        function hitMouse(e) {
            e.stopPropagation();
            score++; document.getElementById('score-display').innerText = score;
            updateDifficulty(); moveMouse();
        }

        function missClick() {
            lives--; document.getElementById('lives-display').innerText = lives;
            if (lives <= 0) endGame();
        }

        function updateDifficulty() {
            clearInterval(gameInterval);
            let delay = score < 20 ? 2000 - (score * 70) : 800;
            gameInterval = setInterval(moveMouse, delay);
        }

        function endGame() {
            clearInterval(gameInterval);
            hideModal('confirm-modal');
            const name = document.getElementById('player-name').value;
            const ref = database.ref('leaderboard/' + name);
            ref.once('value').then(snap => {
                if (!snap.exists() || score > snap.val().score) { ref.set({ name: name, score: score }); }
            });
            const lang = document.getElementById('lang-select').value;
            document.getElementById('txt-final-score-msg').innerText = translations[lang].final + score;
            showModal('result-modal');
        }

        function loadLeaderboard() {
            const list = document.getElementById('leaderboard-list');
            const lang = document.getElementById('lang-select').value;
            list.innerHTML = `<li>${translations[lang].loading}</li>`;
            database.ref('leaderboard').orderByChild('score').limitToLast(100).on('value', snap => {
                let items = [];
                snap.forEach(c => items.push(c.val()));
                items.sort((a, b) => b.score - a.score);
                list.innerHTML = items.map((e, i) => `<li><span>#${i+1} ${e.name}</span><span>${e.score}</span></li>`).join('');
            });
        }

        function showModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function hideModal(id) { document.getElementById(id).classList.add('hidden'); }
        function quitToMenu() {
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('main-menu').classList.remove('hidden');
        }
        function toggleSettings(show) {
            if (show) { loadLeaderboard(); showModal('settings-menu'); document.getElementById('main-menu').classList.add('hidden'); }
            else { hideModal('settings-menu'); document.getElementById('main-menu').classList.remove('hidden'); }
        }

        window.onload = changeLanguage;
    </script>
</body>
</html>
